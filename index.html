<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Astro AI</title>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #131314;
            --text: #e3e3e3;
            --input-bg: #1e1f20;
            --sidebar: #28292a;
            --gradient: linear-gradient(70deg, #4285f4, #9b72cb, #d96570);
            --max-width: 800px;
        }

        body.light-mode {
            --bg: #ffffff;
            --text: #1f1f1f;
            --input-bg: #f0f4f9;
            --sidebar: #f8fafd;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Google Sans', sans-serif;
            overflow: hidden; 
            transition: background 0.3s;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        header {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo h2 {
            margin: 0;
            font-size: 1.4rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            scroll-behavior: smooth;
        }

        .content-container {
            width: 100%;
            max-width: var(--max-width);
        }

        .entry {
            margin-bottom: 2.5rem;
            animation: fadeIn 0.4s ease forwards;
            word-wrap: break-word;
        }

        .user-entry {
            font-size: 1.4rem;
            color: var(--text);
            margin-top: 1rem;
        }

        .astro-entry {
            display: flex;
            gap: 1rem;
            line-height: 1.7;
            font-size: 1rem;
        }

        .astro-icon {
            width: 28px;
            height: 28px;
            background: var(--gradient);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .footer-area {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 1rem;
            background: linear-gradient(transparent, var(--bg) 30%);
        }

        .input-container {
            background: var(--input-bg);
            width: 100%;
            max-width: var(--max-width);
            border-radius: 28px;
            padding: 0.4rem 1.2rem;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            padding: 0.8rem 0;
            font-size: 1rem;
            outline: none;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 8px;
            display: flex;
            border-radius: 50%;
        }

        .icon-btn:hover { background: rgba(128,128,128,0.1); }

        #settingsOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center;
            z-index: 1000; padding: 20px;
        }

        .settings-card {
            background: var(--sidebar);
            padding: 2rem;
            border-radius: 24px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .setting-row {
            display: flex; justify-content: space-between; align-items: center; margin: 1.2rem 0;
        }

        select {
            padding: 6px 10px; border-radius: 8px; background: var(--bg); color: var(--text); border: 1px solid #555;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .user-entry { font-size: 1.2rem; }
            header { padding: 0.8rem; }
            .logo h2 { font-size: 1.1rem; }
        }
    </style>
</head>
